name: API Automation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Start FastAPI Server
        run: |
          nohup uvicorn api_server:app --host 127.0.0.1 --port 8000 &

      - name: Wait For Server
        run: |
          sleep 5

      - name: Run Tests
        run: |
          pytest --env=dev
